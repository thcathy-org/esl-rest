spring.datasource.url=jdbc:mysql://${MYSQL_HOST}/${MYSQL_DATABASE}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.initialize=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

PhoneticPractice.MaxQuestions=10
Dictation.MaxDictationStatistics=5
Dictation.Article.MaxSentenceLength=40
Dictation.MaxSearchResult=50
RankingService.numOfScore=5
PracticeHistory.MaxPerMember=10
MemberWordDAO.LearntCorrectRequire=5
CachedVocabService.CacheSize=1000
ImageGenerationService.RequestTimeoutInSecond=10
ReplicateAIService.RequestTimeoutInSecond=60

# TTS publisher service
R2_BUCKET=funfunspell-audio
R2_PUBLIC_BASE_URL=https://audio.funfunspell.com
TtsPublisherService.IntervalSeconds=10
TtsPublisherService.BackoffSeconds=300
TtsPublisherService.Version=v1
TtsPublisherService.Voice=af_sarah
TtsPublisherService.BatchSize=100
SpeechWorkerService.RequestTimeoutInSecond=30

auth0.cert=/thcathy.pem

management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=OPTIONS, GET, POST, PUT
management.endpoints.web.cors.allowed-headers=*
