spring.datasource.url=jdbc:mysql://${MYSQL_HOST}/${MYSQL_DATABASE}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.initialize=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

PhoneticPractice.MaxQuestions=10
Dictation.MaxDictationStatistics=5
Dictation.Article.MaxSentenceLength=40
Dictation.MaxSearchResult=50
RankingService.numOfScore=5
PracticeHistory.MaxPerMember=10
MemberWordDAO.LearntCorrectRequire=5
CachedVocabService.CacheSize=1000
ImageGenerationService.RequestTimeoutInSecond=10
ReplicateAIService.RequestTimeoutInSecond=60
ReplicateAIService.InterpretationModel=openai/gpt-5-mini

# TTS publisher service
R2_BUCKET=funfunspell-audio
R2_PUBLIC_BASE_URL=https://audio.funfunspell.com
TtsPublisherService.IntervalSeconds=1
TtsPublisherService.BackoffSeconds=300
TtsPublisherService.MaxAttempts=288
TtsPublisherService.Version=v2
TtsPublisherService.Provider=azure_tts
TtsPublisherService.BatchSize=10
SpeechWorkerService.RequestTimeoutInSecond=30

# Cloudflare AI service
CloudflareAIService.RequestTimeoutInSecond=30
CloudflareAIService.Aura2.Speaker=luna
CloudflareAIService.Aura2.Encoding=mp3
CloudflareAIService.Aura2.BitRate=48000

# Azure Neural TTS
AzureTtsService.Region=japaneast
AzureTtsService.Voice=en-US-AvaNeural
AzureTtsService.OutputFormat=audio-24khz-96kbitrate-mono-mp3
AzureTtsService.RequestTimeoutInSecond=30

auth0.cert=/thcathy.pem

management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=OPTIONS, GET, POST, PUT
management.endpoints.web.cors.allowed-headers=*

# Fish Speech TTS (self-hosted, used by queue publisher)
TtsPublisherService.QueueProvider=fish_speech
TtsQueueService.LongContentThreshold=1000
FishSpeechService.RequestTimeoutInSecond=120

# Gmail SMTP for feedback emails
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
feedback.recipient=contactfunfunspell@gmail.com

# placeholder for testing
ESL_SPEECH_WORKER_HOST=
ESL_SPEECH_WORKER_APIKEY=
CLOUDFLARE_ACCOUNT_ID=
CLOUDFLARE_API_TOKEN=
REPLICATE_API_TOKEN=
R2_ENDPOINT=
R2_ACCESS_KEY_ID=
R2_SECRET_ACCESS_KEY=
AZURE_SPEECH_KEY=
FISH_SPEECH_URL=
FISH_SPEECH_USERNAME=
FISH_SPEECH_PASSWORD=
